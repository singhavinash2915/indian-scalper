<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Trend Spider — Dashboard</title>

<!-- HTMX for partial refreshes -->
<script src="https://unpkg.com/htmx.org@1.9.12"></script>
<!-- Plotly for the equity curve -->
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js" charset="utf-8"></script>
<!-- Premium fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
  :root {
    /* ---- Backdrop ---- */
    --bg:        #0a0b10;
    --bg-2:      #0f1118;
    --panel:     rgba(255,255,255,0.028);
    --panel-2:   rgba(255,255,255,0.05);
    --border:    rgba(255,255,255,0.08);
    --border-hi: rgba(255,255,255,0.16);

    /* ---- Text ---- */
    --fg:        #eaecf0;
    --muted:     #8d93a3;
    --text-mute: #5a5f6e;

    /* ---- Amber-first accent (kept) ---- */
    --amber:     #f5a623;
    --amber-hi:  #ffc25c;
    --amber-bg:  rgba(245, 166, 35, 0.12);
    --accent:    #f5a623;     /* legacy alias — dashboards still reference --accent */

    /* ---- Softer P&L colours ---- */
    --good:      #34d399;
    --good-bg:   rgba(52, 211, 153, 0.14);
    --bad:       #fb7185;
    --bad-bg:    rgba(251, 113, 133, 0.14);
    --warn:      #fbbf24;
    --warn-bg:   rgba(251, 191, 36, 0.14);
    --blue:      #60a5fa;
    --blue-bg:   rgba(96, 165, 250, 0.12);

    --grad-amber: linear-gradient(135deg, #f5a623 0%, #ffc25c 100%);
    --glow-amber: 0 0 36px rgba(245, 166, 35, 0.3);
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    background: var(--bg);
    color: var(--fg);
    font-family: 'Inter', ui-sans-serif, system-ui, -apple-system, "SF Pro Text", sans-serif;
    font-size: 13px; line-height: 1.5; letter-spacing: 0.005em;
    -webkit-font-smoothing: antialiased;
    /* Subtle amber ambient glow */
    background-image:
      radial-gradient(1100px 500px at 12% -8%,  rgba(245,166,35,0.07),  transparent 60%),
      radial-gradient(900px  500px at 92% 110%, rgba(255,138,61,0.05), transparent 60%);
    background-attachment: fixed;
  }

  .mono, code, pre { font-family: 'JetBrains Mono', ui-monospace, Menlo, monospace; font-feature-settings: 'tnum' 1, 'zero' 1; }

  /* ---- Global glass helper (used by panels) ---- */
  .glass {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    backdrop-filter: blur(18px) saturate(140%);
    -webkit-backdrop-filter: blur(18px) saturate(140%);
  }

  /* ---- Warning banner (e.g. "paper trading") ---- */
  .banner {
    background: linear-gradient(90deg, rgba(251,191,36,0.18), rgba(245,166,35,0.08));
    color: var(--warn);
    font-weight: 700; letter-spacing: 0.14em;
    text-align: center; padding: 8px 16px; font-size: 11px;
    text-transform: uppercase;
    border-bottom: 1px solid var(--border);
  }

  /* ---- Top bar (brand + meta) ---- */
  header.topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 22px; margin: 16px 20px 0;
    position: relative; overflow: hidden;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    backdrop-filter: blur(18px) saturate(140%);
    -webkit-backdrop-filter: blur(18px) saturate(140%);
  }
  header.topbar::after {
    content: ''; position: absolute; inset: 0; pointer-events: none;
    background: linear-gradient(90deg, rgba(245,166,35,0.05), transparent 40%);
  }
  header.topbar .brand {
    display: flex; align-items: center; gap: 14px; position: relative; z-index: 1;
  }
  header.topbar .brand-mark {
    width: 34px; height: 34px;
    display: grid; place-items: center;
    border-radius: 9px;
    background: var(--grad-amber);
    color: #0a0b10;
    font-size: 16px; font-weight: 800;
    letter-spacing: -0.05em;
    box-shadow: var(--glow-amber);
  }
  header.topbar h1 {
    margin: 0; font-size: 15px; font-weight: 700; letter-spacing: -0.01em;
  }
  header.topbar .brand-sub {
    color: var(--text-mute); font-size: 10.5px;
    letter-spacing: 0.15em; text-transform: uppercase; font-weight: 500;
    margin-top: 3px;
  }
  header.topbar .meta {
    color: var(--muted); font-size: 11px;
    font-family: 'JetBrains Mono', monospace; letter-spacing: 0.05em;
    position: relative; z-index: 1;
  }

  main { padding: 14px 20px; max-width: 1520px; margin: 0 auto; }

  /* ---- Nav tabs ---- */
  nav.tabs {
    display: flex; gap: 4px; padding: 6px 22px 0;
    margin: 14px 20px 0;
    border-bottom: 1px solid var(--border);
  }
  nav.tabs a {
    padding: 10px 18px; color: var(--muted); text-decoration: none;
    font-size: 12px; font-weight: 600;
    letter-spacing: 0.08em; text-transform: uppercase;
    border-bottom: 2px solid transparent;
    transition: all 0.15s ease;
  }
  nav.tabs a:hover { color: var(--fg); }
  nav.tabs a.active {
    color: var(--amber); border-bottom-color: var(--amber);
  }
  nav.tabs a.disabled {
    color: var(--text-mute); cursor: not-allowed; opacity: 0.4;
  }

  /* ---- Grids ---- */
  .grid { display: grid; gap: 14px; }
  .grid.kpis { grid-template-columns: repeat(auto-fit, minmax(175px, 1fr)); }

  /* ---- Panels (base tile) ---- */
  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 18px;
    backdrop-filter: blur(18px) saturate(140%);
    -webkit-backdrop-filter: blur(18px) saturate(140%);
    position: relative; overflow: hidden;
  }
  .panel h2 {
    margin: 0 0 10px; font-size: 10.5px; text-transform: uppercase;
    letter-spacing: 0.2em; color: var(--muted); font-weight: 700;
    display: flex; align-items: center; gap: 8px;
  }
  .panel h2::before {
    content: ''; width: 3px; height: 13px;
    background: var(--grad-amber); border-radius: 2px;
  }

  /* ---- Bucket section header (Equity / F&O) ---- */
  .bucket-header {
    display: flex; align-items: baseline; gap: 14px;
    padding: 4px 4px 8px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 12px;
  }
  .bucket-name {
    font-size: 14px; font-weight: 700; color: var(--fg);
    letter-spacing: -0.01em;
  }
  .bucket-sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; color: var(--text-mute);
    letter-spacing: 0.05em;
  }
  .bucket-sub .good { color: var(--good); font-weight: 600; }
  .bucket-sub .warn { color: var(--warn); font-weight: 600; }

  /* ---- KPI cards ---- */
  .kpi {
    position: relative; overflow: hidden;
    padding: 16px 18px;
    transition: transform 0.2s ease, border-color 0.2s ease;
  }
  .kpi:hover { transform: translateY(-1px); border-color: var(--border-hi); }
  .kpi::before {
    content: ''; position: absolute; top: 0; left: 14px; right: 14px; height: 2px;
    background: var(--grad-amber); border-radius: 2px; opacity: 0.9;
  }
  .kpi::after {
    content: ''; position: absolute; top: -40px; left: 50%; transform: translateX(-50%);
    width: 60%; height: 60px;
    background: radial-gradient(ellipse, rgba(245,166,35,0.14), transparent 70%);
    pointer-events: none;
  }
  .kpi h2 { margin-bottom: 8px; }
  .kpi h2::before { display: none; }
  .kpi .value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 22px; font-weight: 600; letter-spacing: -0.015em;
    font-variant-numeric: tabular-nums;
  }
  .kpi .sub {
    color: var(--muted); font-size: 11px; margin-top: 6px;
    font-family: 'JetBrains Mono', monospace;
  }
  .good { color: var(--good); }
  .bad  { color: var(--bad); }
  .warn { color: var(--warn); }

  /* ---- Tables ---- */
  table {
    width: 100%; border-collapse: collapse;
    font-variant-numeric: tabular-nums;
    font-family: 'JetBrains Mono', monospace; font-size: 12px;
  }
  th, td {
    text-align: left; padding: 9px 12px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  th {
    color: var(--text-mute); font-size: 10px;
    text-transform: uppercase; letter-spacing: 0.15em;
    font-family: 'Inter', sans-serif; font-weight: 600;
    background: rgba(255,255,255,0.015);
  }
  tr:last-child td { border-bottom: none; }
  tbody tr { transition: background 0.15s ease; }
  tbody tr:hover td { background: rgba(245,166,35,0.045); }
  .empty { color: var(--text-mute); font-style: italic; padding: 8px 0; }

  /* ---- Buttons ---- */
  button {
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border-hi);
    color: var(--fg);
    padding: 7px 14px; border-radius: 8px;
    cursor: pointer; font-size: 12px; font-weight: 500;
    letter-spacing: 0.06em; font-family: inherit;
    transition: all 0.18s ease;
  }
  button:hover { border-color: var(--amber); color: var(--amber); background: var(--amber-bg); }
  button.danger {
    border-color: rgba(251,113,133,0.35); color: var(--bad);
    background: rgba(251,113,133,0.06);
  }
  button.danger:hover { background: var(--bad-bg); border-color: var(--bad); color: var(--bad); }

  /* ---- Logs ---- */
  .logs {
    max-height: 260px; overflow-y: auto;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11.5px; line-height: 1.65;
    color: var(--muted); white-space: pre-wrap;
    background: rgba(0,0,0,0.3);
    border-radius: 8px; padding: 12px 14px;
    border: 1px solid var(--border);
    scrollbar-width: thin;
    scrollbar-color: var(--border-hi) transparent;
  }
  .logs::-webkit-scrollbar { width: 6px; }
  .logs::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 3px; }

  .flex { display: flex; gap: 8px; align-items: center; }
  .spacer { flex: 1; }

  /* ---- Trade-mode pill + three-way switch ---- */
  .mode-container { display: flex; align-items: center; gap: 14px; }
  .mode-pill {
    display: inline-block; padding: 7px 14px; border-radius: 999px;
    font-weight: 700; font-size: 11px; letter-spacing: 0.14em;
    text-transform: uppercase;
    border: 1px solid transparent;
  }
  .mode-watch { background: var(--blue-bg);  color: var(--blue);  border-color: rgba(96,165,250,0.3); }
  .mode-paper { background: var(--amber-bg); color: var(--amber); border-color: rgba(245,166,35,0.3); }
  .mode-live  { background: var(--bad-bg);   color: var(--bad);   border-color: rgba(251,113,133,0.5);
                animation: blink 1.2s linear infinite; }
  @keyframes blink { 50% { opacity: 0.55; } }

  .mode-switch {
    display: inline-flex;
    border: 1px solid var(--border-hi); border-radius: 9px; overflow: hidden;
    background: rgba(255,255,255,0.03);
  }
  .mode-btn {
    background: transparent; color: var(--muted); border: none;
    padding: 7px 13px; font-size: 11px; font-weight: 600;
    letter-spacing: 0.1em; text-transform: uppercase;
    cursor: pointer; border-radius: 0;
    border-right: 1px solid var(--border);
    transition: all 0.15s ease;
  }
  .mode-btn:last-child { border-right: none; }
  .mode-btn:hover:not(:disabled) { background: var(--panel-2); color: var(--fg); }
  .mode-btn.active { background: var(--grad-amber); color: #0a0b10; font-weight: 700; }
  .mode-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .mode-btn.mode-live.active { background: var(--bad); color: #fff; }
  .mode-btn.mode-paper.active { background: var(--grad-amber); color: #0a0b10; }

  /* ---- Confirm modal ---- */
  .modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    display: none; align-items: center; justify-content: center;
    z-index: 50;
  }
  .modal-backdrop.open { display: flex; }
  .modal {
    background: var(--bg-2);
    border: 1px solid var(--border-hi);
    border-radius: 14px;
    padding: 22px; width: 480px; max-width: 90vw;
    box-shadow: 0 20px 60px -20px rgba(0,0,0,0.8);
  }
  .modal h3 {
    margin: 0 0 10px; font-size: 15px; font-weight: 700;
  }
  .modal .warn-list { color: var(--warn); font-size: 12.5px; margin: 8px 0; }
  .modal .actions { display: flex; gap: 8px; margin-top: 16px; justify-content: flex-end; }
  .modal input[type=text] {
    width: 100%; padding: 9px 12px; margin-top: 6px;
    background: rgba(0,0,0,0.3); color: var(--fg);
    border: 1px solid var(--border-hi); border-radius: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
  }
  .modal input[type=text]:focus { outline: 1px solid var(--amber); border-color: var(--amber); }
  .modal .err { color: var(--bad); font-size: 11.5px; margin-top: 6px; min-height: 16px; }

  /* ---- Controls panel ---- */
  .control-panel { display: flex; align-items: center; gap: 14px; }
  .control-buttons { display: inline-flex; gap: 6px; }
  .status-pill {
    display: inline-block; padding: 7px 14px; border-radius: 999px;
    font-weight: 700; font-size: 11px; letter-spacing: 0.14em;
    text-transform: uppercase;
    border: 1px solid transparent;
  }
  .status-running { background: var(--good-bg);  color: var(--good);  border-color: rgba(52,211,153,0.3); }
  .status-paused  { background: var(--amber-bg); color: var(--amber); border-color: rgba(245,166,35,0.3); }
  .status-stopped { background: rgba(141,147,163,0.12); color: var(--muted); border-color: rgba(141,147,163,0.25); }
  .status-killed  { background: var(--bad-bg); color: var(--bad); border-color: rgba(251,113,133,0.45);
                    animation: blink 1.2s linear infinite; }
  .status-running::before {
    content: ''; display: inline-block; width: 6px; height: 6px; border-radius: 50%;
    background: var(--good); margin-right: 8px; vertical-align: middle;
    box-shadow: 0 0 0 0 var(--good); animation: pulse-dot 1.8s infinite;
  }
  @keyframes pulse-dot {
    0%   { box-shadow: 0 0 0 0   rgba(52,211,153,0.5); }
    70%  { box-shadow: 0 0 0 8px rgba(52,211,153,0); }
    100% { box-shadow: 0 0 0 0   rgba(52,211,153,0); }
  }

  .ctrl-btn {
    background: rgba(255,255,255,0.04);
    color: var(--fg); border: 1px solid var(--border-hi);
    padding: 6px 13px; border-radius: 8px;
    font-size: 11px; font-weight: 600;
    letter-spacing: 0.08em; text-transform: uppercase;
    cursor: pointer; font-family: inherit;
    transition: all 0.15s ease;
  }
  .ctrl-btn:hover:not(:disabled) { background: var(--amber-bg); color: var(--amber); border-color: var(--amber); }
  .ctrl-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .ctrl-btn.danger {
    border-color: rgba(251,113,133,0.4); color: var(--bad);
    background: rgba(251,113,133,0.08);
  }
  .ctrl-btn.danger:hover:not(:disabled) { background: var(--bad-bg); border-color: var(--bad); }

  /* ---- Kill modal countdown ---- */
  #kill-progress {
    height: 5px; width: 100%;
    background: rgba(255,255,255,0.06); border-radius: 3px;
    overflow: hidden; margin-top: 12px;
  }
  #kill-progress-fill {
    height: 100%; width: 0%;
    background: linear-gradient(90deg, var(--bad), var(--amber));
    transition: width 100ms linear;
  }

  /* ---- Audit drawer ---- */
  details.audit-drawer {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px; padding: 14px 18px;
    margin-top: 16px;
    backdrop-filter: blur(18px) saturate(140%);
    -webkit-backdrop-filter: blur(18px) saturate(140%);
  }
  details.audit-drawer > summary {
    cursor: pointer; font-size: 11px; text-transform: uppercase;
    letter-spacing: 0.2em; color: var(--muted); font-weight: 700;
    list-style: none;
    display: flex; align-items: center; gap: 8px;
  }
  details.audit-drawer > summary::before {
    content: ''; width: 3px; height: 13px;
    background: var(--grad-amber); border-radius: 2px;
  }
  details.audit-drawer > summary::-webkit-details-marker { display: none; }
  details.audit-drawer[open] > summary { margin-bottom: 12px; }
  .audit-drawer td, .audit-drawer th {
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
  }

  /* ---- Signals (score chips + action pills) ---- */
  .score-chip {
    display: inline-block; padding: 2px 9px; border-radius: 999px;
    font-weight: 700; font-size: 10.5px; letter-spacing: 0.08em;
  }
  .score-strong { background: var(--good-bg);  color: var(--good);  border: 1px solid rgba(52,211,153,0.25); }
  .score-mid    { background: var(--amber-bg); color: var(--amber); border: 1px solid rgba(245,166,35,0.25); }
  .score-low    { background: rgba(141,147,163,0.1); color: var(--muted); border: 1px solid rgba(141,147,163,0.2); }

  tr.row-entered      td { background: rgba(52, 211, 153, 0.05); }
  tr.row-watch-logged td { background: rgba(96, 165, 250, 0.05); }

  .action-pill {
    display: inline-block; padding: 2px 8px; border-radius: 5px;
    font-size: 9.5px; letter-spacing: 0.08em; font-weight: 700;
    text-transform: uppercase;
  }
  .a-entered      { background: var(--good-bg);  color: var(--good);  border: 1px solid rgba(52,211,153,0.3); }
  .a-watch        { background: var(--blue-bg);  color: var(--blue);  border: 1px solid rgba(96,165,250,0.3); }
  .a-sk-score     { background: rgba(141,147,163,0.12); color: var(--muted); }
  .a-sk-filter    { background: rgba(167,112,240,0.12); color: #c084fc; }
  .a-sk-risk      { background: var(--amber-bg); color: var(--amber); }
  .a-sk-poscap    { background: var(--amber-bg); color: var(--amber-hi); }
  .a-sk-disabled  { background: rgba(141,147,163,0.1); color: var(--text-mute); }
  tr.signal-row:hover { cursor: pointer; background: rgba(245,166,35,0.05); }

  /* ---- Chart drawer ---- */
  .chart-drawer {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.8);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    display: none; z-index: 60;
    align-items: stretch; justify-content: center; padding: 30px;
  }
  .chart-drawer.open { display: flex; }
  .chart-drawer .chart-box {
    background: var(--bg-2);
    border: 1px solid var(--border-hi); border-radius: 14px;
    padding: 16px 20px; flex: 1 1 auto; max-width: 1400px; overflow-y: auto;
  }
  .chart-head { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
  .chart-head h3 { margin: 0; font-size: 15px; font-weight: 700; }
  .chart-head .spacer { flex: 1; }
  .chart-box label.auto-refresh { color: var(--muted); font-size: 12px; }
</style>
</head>
<body>

<div class="banner">{{ banner }}</div>

<header class="topbar">
  <div class="brand">
    <div class="brand-mark">₹</div>
    <div>
      <h1>The <span style="opacity:0.35;font-weight:300;">/</span> Trend Spider</h1>
      <div class="brand-sub">Momentum · 15m · Nifty 100</div>
    </div>
  </div>
  <div class="meta">HTMX polling · no SPA · no auth</div>
</header>

{% set current_tab = current_tab|default('dashboard') %}
<nav class="tabs">
  <a href="/" class="{{ 'active' if current_tab == 'dashboard' else '' }}">Dashboard</a>
  <a href="/universe" class="{{ 'active' if current_tab == 'universe' else '' }}">Universe</a>
  <a href="/signals" class="{{ 'active' if current_tab == 'signals' else '' }}">Signals</a>
  <a class="disabled" title="logs partial lives on Dashboard for now">Logs</a>
</nav>

<main>
  {% block content %}{% endblock %}
</main>

</body>
</html>
