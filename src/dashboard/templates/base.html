<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Indian Scalper — Dashboard</title>

<!-- HTMX for partial refreshes -->
<script src="https://unpkg.com/htmx.org@1.9.12"></script>
<!-- Plotly for the equity curve -->
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js" charset="utf-8"></script>

<style>
  :root {
    --bg: #0b0f15;
    --panel: #121821;
    --panel-2: #1a222e;
    --fg: #e6edf3;
    --muted: #8b949e;
    --accent: #58a6ff;
    --good: #3fb950;
    --bad: #f85149;
    --warn: #d29922;
    --border: #30363d;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; background: var(--bg); color: var(--fg);
    font-family: ui-sans-serif, system-ui, -apple-system, "SF Pro Text", sans-serif;
    font-size: 14px; line-height: 1.45;
  }
  .banner {
    background: repeating-linear-gradient(
      45deg, #5a2020, #5a2020 16px, #6a2424 16px, #6a2424 32px
    );
    color: #ffdada; font-weight: 700; letter-spacing: 0.08em;
    text-align: center; padding: 8px 16px; font-size: 13px;
    border-bottom: 1px solid var(--border);
  }
  header.topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 20px; border-bottom: 1px solid var(--border);
    background: var(--panel);
  }
  header.topbar h1 { margin: 0; font-size: 17px; font-weight: 600; }
  header.topbar .meta { color: var(--muted); font-size: 12px; }
  main { padding: 16px 20px; max-width: 1400px; margin: 0 auto; }

  .grid { display: grid; gap: 16px; }
  .grid.kpis { grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); }

  .panel {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px 16px;
  }
  .panel h2 {
    margin: 0 0 10px; font-size: 13px; text-transform: uppercase;
    letter-spacing: 0.06em; color: var(--muted); font-weight: 600;
  }
  .kpi .value { font-size: 22px; font-weight: 600; }
  .kpi .sub { color: var(--muted); font-size: 12px; margin-top: 4px; }
  .good { color: var(--good); }
  .bad { color: var(--bad); }
  .warn { color: var(--warn); }

  table { width: 100%; border-collapse: collapse; font-variant-numeric: tabular-nums; }
  th, td { text-align: left; padding: 7px 10px; border-bottom: 1px solid var(--border); }
  th { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; }
  tr:last-child td { border-bottom: none; }
  .empty { color: var(--muted); font-style: italic; padding: 8px 0; }

  button {
    background: var(--panel-2); border: 1px solid var(--border);
    color: var(--fg); padding: 8px 14px; border-radius: 6px;
    cursor: pointer; font-size: 13px;
  }
  button:hover { background: #222c3a; }
  button.danger { border-color: var(--bad); color: var(--bad); }
  button.danger:hover { background: #3a1818; }

  .logs {
    max-height: 260px; overflow-y: auto; font-family: ui-monospace, Menlo, monospace;
    font-size: 12px; color: var(--muted); white-space: pre-wrap;
    background: #0a0e14; border-radius: 6px; padding: 10px; border: 1px solid var(--border);
  }
  .flex { display: flex; gap: 8px; align-items: center; }
  .spacer { flex: 1; }

  /* ---- Trade-mode pill + three-way switch (D11 Slice 0) ---- */
  .mode-container { display: flex; align-items: center; gap: 14px; }
  .mode-pill {
    display: inline-block; padding: 8px 14px; border-radius: 999px;
    font-weight: 700; font-size: 12px; letter-spacing: 0.12em;
    border: 1px solid var(--border);
  }
  .mode-watch { background: #0f2440; color: #79c0ff; border-color: #1f4d80; }
  .mode-paper { background: #3a2e10; color: #f0b552; border-color: #6b5320; }
  .mode-live  { background: #4a1414; color: #ffa7a7; border-color: #8b2222;
                animation: blink 1.2s linear infinite; }
  @keyframes blink { 50% { opacity: 0.55; } }
  .mode-switch { display: inline-flex; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .mode-btn {
    background: var(--panel); color: var(--muted); border: none;
    padding: 7px 12px; font-size: 12px; cursor: pointer; border-radius: 0;
    border-right: 1px solid var(--border);
  }
  .mode-btn:last-child { border-right: none; }
  .mode-btn:hover:not(:disabled) { background: var(--panel-2); color: var(--fg); }
  .mode-btn.active { background: var(--accent); color: #0b0f15; font-weight: 600; }
  .mode-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .mode-btn.mode-live.active { background: var(--bad); color: #fff; }
  .mode-btn.mode-paper.active { background: var(--warn); color: #0b0f15; }

  /* ---- Confirm modal ---- */
  .modal-backdrop {
    position: fixed; inset: 0; background: rgba(0,0,0,0.6);
    display: none; align-items: center; justify-content: center; z-index: 50;
  }
  .modal-backdrop.open { display: flex; }
  .modal {
    background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
    padding: 20px; width: 460px; max-width: 90vw;
  }
  .modal h3 { margin: 0 0 10px; font-size: 16px; }
  .modal .warn-list { color: var(--warn); font-size: 13px; margin: 8px 0; }
  .modal .actions { display: flex; gap: 8px; margin-top: 14px; justify-content: flex-end; }
  .modal input[type=text] {
    width: 100%; padding: 8px 10px; margin-top: 6px;
    background: var(--bg); color: var(--fg); border: 1px solid var(--border);
    border-radius: 6px; font-family: inherit;
  }
  .modal .err { color: var(--bad); font-size: 12px; margin-top: 6px; min-height: 16px; }

  /* ---- Controls panel (D11 Slice 1) ---- */
  .control-panel { display: flex; align-items: center; gap: 14px; }
  .control-buttons { display: inline-flex; gap: 6px; }
  .status-pill {
    display: inline-block; padding: 7px 14px; border-radius: 999px;
    font-weight: 700; font-size: 12px; letter-spacing: 0.12em;
    border: 1px solid var(--border);
  }
  .status-running { background: #0f2d18; color: #7de28a; border-color: #1f5a34; }
  .status-paused  { background: #3a2e10; color: #f0b552; border-color: #6b5320; }
  .status-stopped { background: #1c232d; color: #9099a6; border-color: #30363d; }
  .status-killed  { background: #4a1414; color: #ffa7a7; border-color: #8b2222;
                    animation: blink 1.2s linear infinite; }
  .ctrl-btn {
    background: var(--panel-2); color: var(--fg); border: 1px solid var(--border);
    padding: 6px 12px; border-radius: 6px; font-size: 12px;
    cursor: pointer; font-weight: 600;
  }
  .ctrl-btn:hover:not(:disabled) { background: #2a3444; }
  .ctrl-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .ctrl-btn.danger {
    border-color: var(--bad); color: var(--bad); background: #2a1010;
  }
  .ctrl-btn.danger:hover:not(:disabled) { background: #3a1818; }

  /* ---- Kill modal: 3s countdown hold ---- */
  #kill-progress {
    height: 4px; width: 100%; background: #2a2a2a; border-radius: 2px;
    overflow: hidden; margin-top: 10px;
  }
  #kill-progress-fill {
    height: 100%; width: 0%; background: var(--bad);
    transition: width 100ms linear;
  }

  /* ---- Audit drawer ---- */
  details.audit-drawer {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px 16px; margin-top: 16px;
  }
  details.audit-drawer > summary {
    cursor: pointer; font-size: 13px; text-transform: uppercase;
    letter-spacing: 0.06em; color: var(--muted); font-weight: 600;
    list-style: none;
  }
  details.audit-drawer > summary::-webkit-details-marker { display: none; }
  details.audit-drawer[open] > summary { margin-bottom: 10px; }
  .audit-drawer td.small, .audit-drawer th { font-size: 11px; }
  .audit-drawer td { font-family: ui-monospace, Menlo, monospace; font-size: 11px; }
</style>
</head>
<body>

<div class="banner">{{ banner }}</div>

<header class="topbar">
  <h1>Indian Scalper</h1>
  <div class="meta">Dashboard · HTMX polling</div>
</header>

<main>
  {% block content %}{% endblock %}
</main>

</body>
</html>
