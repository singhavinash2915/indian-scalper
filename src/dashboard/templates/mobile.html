<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<meta name="theme-color" content="#0a0b10">
<title>The Trend Spider — mobile</title>

<script src="https://unpkg.com/htmx.org@1.9.12"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  :root {
    --bg:        #0a0b10;
    --bg-2:      #0f1118;
    --panel:     rgba(255,255,255,0.03);
    --panel-2:   rgba(255,255,255,0.06);
    --border:    rgba(255,255,255,0.09);
    --border-hi: rgba(255,255,255,0.16);
    --fg:        #eaecf0;
    --muted:     #8d93a3;
    --text-mute: #5a5f6e;

    --amber:     #f5a623;
    --amber-hi:  #ffc25c;
    --amber-bg:  rgba(245, 166, 35, 0.12);
    --accent:    #f5a623;

    --good:      #34d399;
    --good-bg:   rgba(52, 211, 153, 0.14);
    --bad:       #fb7185;
    --bad-bg:    rgba(251, 113, 133, 0.14);
    --warn:      #fbbf24;
    --blue:      #60a5fa;
    --blue-bg:   rgba(96, 165, 250, 0.12);

    --grad-amber: linear-gradient(135deg, #f5a623 0%, #ffc25c 100%);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; background: var(--bg); color: var(--fg); }
  body {
    font-family: 'Inter', -apple-system, system-ui, sans-serif;
    font-size: 14.5px; line-height: 1.45;
    padding-bottom: 120px;
    -webkit-font-smoothing: antialiased;
    background-image:
      radial-gradient(900px 400px at 10% -10%, rgba(245,166,35,0.08), transparent 60%);
    background-attachment: fixed;
  }
  .mono { font-family: 'JetBrains Mono', ui-monospace, Menlo, monospace; font-variant-numeric: tabular-nums; }

  .banner {
    background: linear-gradient(90deg, rgba(251,191,36,0.18), rgba(245,166,35,0.08));
    color: var(--warn);
    font-weight: 700; font-size: 10px;
    letter-spacing: 0.14em; text-transform: uppercase;
    text-align: center; padding: 6px 10px;
    border-bottom: 1px solid var(--border);
  }
  header {
    padding: 14px 16px 12px; border-bottom: 1px solid var(--border);
    background: var(--panel);
    backdrop-filter: blur(18px) saturate(140%);
    -webkit-backdrop-filter: blur(18px) saturate(140%);
    display: flex; align-items: center; gap: 12px;
  }
  header .brand-mark {
    width: 32px; height: 32px;
    display: grid; place-items: center;
    border-radius: 9px;
    background: var(--grad-amber);
    color: #0a0b10;
    font-size: 15px; font-weight: 800;
    letter-spacing: -0.05em;
    box-shadow: 0 0 30px rgba(245,166,35,0.3);
  }
  header h1 { margin: 0; font-size: 15px; font-weight: 700; letter-spacing: -0.01em; }
  header .spacer { flex: 1; }
  header a.desktop-link {
    color: var(--muted); font-size: 10.5px; text-decoration: none;
    letter-spacing: 0.1em; text-transform: uppercase; font-weight: 600;
  }
  main { padding: 14px; }

  /* Pills */
  .pill {
    display: inline-block; padding: 5px 12px; border-radius: 999px;
    font-weight: 700; font-size: 10.5px; letter-spacing: 0.13em;
    text-transform: uppercase;
    border: 1px solid transparent;
  }
  .mode-watch { background: var(--blue-bg);  color: var(--blue);  border-color: rgba(96,165,250,0.3); }
  .mode-paper { background: var(--amber-bg); color: var(--amber); border-color: rgba(245,166,35,0.3); }
  .mode-live  { background: var(--bad-bg);   color: var(--bad);   border-color: rgba(251,113,133,0.45);
                animation: blink 1.2s linear infinite; }
  @keyframes blink { 50% { opacity: 0.6; } }
  .status-running { background: var(--good-bg);  color: var(--good);  border-color: rgba(52,211,153,0.3); }
  .status-paused  { background: var(--amber-bg); color: var(--amber); border-color: rgba(245,166,35,0.3); }
  .status-stopped { background: rgba(141,147,163,0.12); color: var(--muted); border-color: rgba(141,147,163,0.25); }
  .status-killed  { background: var(--bad-bg); color: var(--bad); border-color: rgba(251,113,133,0.45);
                    animation: blink 1.2s linear infinite; }

  /* Panels */
  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px; padding: 14px; margin-bottom: 12px;
    backdrop-filter: blur(18px) saturate(140%);
    -webkit-backdrop-filter: blur(18px) saturate(140%);
    position: relative;
  }
  .card h2 {
    margin: 0 0 10px; font-size: 10px; text-transform: uppercase;
    letter-spacing: 0.2em; color: var(--muted); font-weight: 700;
    display: flex; align-items: center; gap: 8px;
  }
  .card h2::before {
    content: ''; width: 3px; height: 12px;
    background: var(--grad-amber); border-radius: 2px;
  }
  .kpi-row {
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
  }
  .kpi-tile {
    background: rgba(255,255,255,0.025);
    border: 1px solid var(--border); border-radius: 10px;
    padding: 12px 14px;
    position: relative; overflow: hidden;
  }
  .kpi-tile::before {
    content: ''; position: absolute; top: 0; left: 12px; right: 12px; height: 2px;
    background: var(--grad-amber); border-radius: 2px; opacity: 0.7;
  }
  .kpi-tile .label {
    color: var(--text-mute); font-size: 9.5px; text-transform: uppercase;
    letter-spacing: 0.15em; font-weight: 600;
  }
  .kpi-tile .value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 19px; font-weight: 600; margin-top: 4px;
    letter-spacing: -0.01em; font-variant-numeric: tabular-nums;
  }
  .kpi-tile .sub {
    color: var(--muted); font-size: 10.5px; margin-top: 4px;
    font-family: 'JetBrains Mono', monospace;
  }
  .good { color: var(--good); } .bad { color: var(--bad); } .warn { color: var(--warn); }

  /* Big touch targets */
  .btn-row { display: grid; gap: 8px; grid-template-columns: 1fr 1fr; }
  .btn {
    background: rgba(255,255,255,0.04);
    color: var(--fg);
    border: 1px solid var(--border-hi); border-radius: 10px;
    padding: 13px; font-size: 13px; font-weight: 600;
    letter-spacing: 0.08em; text-transform: uppercase;
    cursor: pointer; min-height: 50px;
    font-family: inherit;
    transition: all 0.15s ease;
  }
  .btn:active:not(:disabled) { background: var(--amber-bg); border-color: var(--amber); color: var(--amber); }
  .btn:disabled { opacity: 0.32; }
  .btn.danger {
    border-color: rgba(251,113,133,0.4); color: var(--bad);
    background: rgba(251,113,133,0.08);
  }
  .btn.danger:active:not(:disabled) { background: var(--bad-bg); border-color: var(--bad); }
  .btn.full { grid-column: 1 / span 2; }

  /* Signals list */
  .sig-row {
    display: grid; grid-template-columns: auto 1fr auto; gap: 10px;
    padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05);
    align-items: center;
  }
  .sig-row:last-child { border-bottom: none; }
  .score-chip {
    padding: 3px 9px; border-radius: 999px;
    font-weight: 700; font-size: 10.5px;
    letter-spacing: 0.08em; border: 1px solid transparent;
  }
  .score-strong { background: var(--good-bg);  color: var(--good);  border-color: rgba(52,211,153,0.3); }
  .score-mid    { background: var(--amber-bg); color: var(--amber); border-color: rgba(245,166,35,0.3); }
  .score-low    { background: rgba(141,147,163,0.12); color: var(--muted); border-color: rgba(141,147,163,0.2); }
  .sym {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 600; font-size: 14px; letter-spacing: 0.02em;
  }
  .reason { color: var(--muted); font-size: 10.5px; font-family: 'JetBrains Mono', monospace; }

  /* Kill modal — fullscreen on mobile */
  .modal-bg {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    display: none; align-items: flex-end; z-index: 50;
  }
  .modal-bg.open { display: flex; }
  .modal-sheet {
    background: var(--bg-2);
    border-top: 1px solid var(--border-hi);
    width: 100%; padding: 22px 18px 36px;
    border-top-left-radius: 20px; border-top-right-radius: 20px;
  }
  .modal-sheet h3 { margin: 0 0 10px; color: var(--bad); font-size: 16px; font-weight: 700; }
  .hold-bar {
    height: 6px; background: rgba(255,255,255,0.08);
    border-radius: 3px; margin: 14px 0; overflow: hidden;
  }
  .hold-fill {
    height: 100%; width: 0%;
    background: linear-gradient(90deg, var(--bad), var(--amber));
    transition: width 100ms linear;
  }
  .empty { color: var(--text-mute); font-style: italic; padding: 12px 0; font-size: 13px; }
</style>
</head>
<body>

<div class="banner">{{ banner }}</div>

<header>
  <div class="brand-mark">₹</div>
  <h1>The <span style="opacity:0.35;font-weight:300;">/</span> Trend Spider</h1>
  <div class="spacer"></div>
  <a href="/" class="desktop-link">desktop ↗</a>
</header>

<main>
  <!-- Status + mode pills — always fresh via polling -->
  <div class="card" id="overview"
       hx-get="/m/partials/overview"
       hx-trigger="load, every 3s, controls-changed from:body, mode-changed from:body"
       hx-swap="innerHTML">
    <div class="empty">Loading…</div>
  </div>

  <!-- Options positions (NIFTY/BANKNIFTY) — only renders when options_enabled fires -->
  <div class="card">
    <h2>Options · NIFTY / BANKNIFTY</h2>
    <div id="mobile-options"
         hx-get="/partials/options_positions"
         hx-trigger="load, every 5s"
         hx-swap="innerHTML">
      <div class="empty">Loading…</div>
    </div>
  </div>

  <!-- Open positions — surfaced above controls so the live book is always visible first -->
  <div class="card">
    <h2>Open Positions</h2>
    <div id="mobile-positions"
         hx-get="/m/partials/positions"
         hx-trigger="load, every 5s"
         hx-swap="innerHTML">
      <div class="empty">Loading…</div>
    </div>
  </div>

  <!-- Controls -->
  <div class="card">
    <h2>Controls</h2>
    <div class="btn-row" id="mobile-ctrls">
      <button class="btn" data-action="resume">Resume</button>
      <button class="btn" data-action="pause">Pause</button>
      <button class="btn danger full" data-action="kill">KILL (3s hold)</button>
      <button class="btn" data-action="rearm">Re-arm</button>
      <button class="btn" data-action="mode-watch">→ watch_only</button>
    </div>
  </div>

  <!-- Signals: entered + watch-only-logged only (not the 100× skipped_score spam) -->
  <div class="card">
    <h2>Recent signals</h2>
    <div id="mobile-signals"
         hx-get="/m/partials/signals"
         hx-trigger="load, every 10s, controls-changed from:body"
         hx-swap="innerHTML">
      <div class="empty">Loading…</div>
    </div>
  </div>
</main>

<!-- Kill confirm sheet -->
<div class="modal-bg" id="kill-sheet">
  <div class="modal-sheet">
    <h3>Kill switch</h3>
    <div>Squares off every open position at market + stops the scheduler.
      Hold Confirm for 3 s.</div>
    <div class="hold-bar"><div class="hold-fill" id="hold-fill"></div></div>
    <div id="kill-err" style="color: var(--bad); font-size: 12px; min-height: 16px;"></div>
    <div class="btn-row">
      <button class="btn" id="kill-cancel">Cancel</button>
      <button class="btn danger" id="kill-confirm" disabled>Confirm</button>
    </div>
  </div>
</div>

<script>
(function() {
  async function post(path, body) {
    try {
      const res = await fetch(path, {
        method: 'POST',
        headers: body ? {'Content-Type': 'application/json'} : undefined,
        body: body ? JSON.stringify(body) : undefined,
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) { alert(data.detail || 'failed'); return null; }
      document.body.dispatchEvent(new CustomEvent('controls-changed'));
      return data;
    } catch (e) { alert(String(e)); return null; }
  }

  // Kill flow (same 3-sec hold as desktop).
  const sheet = document.getElementById('kill-sheet');
  const holdFill = document.getElementById('hold-fill');
  const killErr = document.getElementById('kill-err');
  const killConfirm = document.getElementById('kill-confirm');
  const killCancel = document.getElementById('kill-cancel');
  let killToken = null, holdHandle = null;

  function closeKill() {
    sheet.classList.remove('open');
    killToken = null;
    holdFill.style.width = '0%';
    killConfirm.disabled = true;
    if (holdHandle) { clearTimeout(holdHandle); holdHandle = null; }
  }
  async function startKill() {
    killErr.innerText = '';
    holdFill.style.width = '0%';
    killConfirm.disabled = true;
    const prep = await fetch('/api/control/kill/prepare', {method: 'POST'})
      .then(r => r.json());
    if (!prep.token) { killErr.innerText = prep.detail || 'prepare failed'; sheet.classList.add('open'); return; }
    killToken = prep.token;
    sheet.classList.add('open');

    const start = Date.now();
    (function tick() {
      const elapsed = Date.now() - start;
      const pct = Math.min(100, (elapsed / 3000) * 100);
      holdFill.style.width = pct + '%';
      if (elapsed >= 3000) killConfirm.disabled = false;
      else holdHandle = setTimeout(tick, 80);
    })();
  }
  killCancel.addEventListener('click', closeKill);
  killConfirm.addEventListener('click', async () => {
    if (!killToken) return;
    const res = await fetch('/api/control/kill/apply', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({token: killToken}),
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok) { killErr.innerText = data.detail || 'apply failed'; return; }
    closeKill();
    document.body.dispatchEvent(new CustomEvent('controls-changed'));
  });

  // Mode-switch to watch_only: two-step (prepare → apply) invisibly.
  async function flipModeTo(target) {
    const prep = await fetch('/api/mode/prepare', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({target}),
    }).then(r => r.json());
    if (!prep.token) { alert(prep.detail || 'prepare failed'); return; }
    const res = await fetch('/api/mode/apply', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({target, token: prep.token}),
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok) { alert(data.detail || 'apply failed'); return; }
    document.body.dispatchEvent(new CustomEvent('mode-changed'));
  }

  document.getElementById('mobile-ctrls').addEventListener('click', ev => {
    const btn = ev.target.closest('.btn'); if (!btn || btn.disabled) return;
    const a = btn.dataset.action;
    if (a === 'pause') post('/api/control/pause');
    else if (a === 'resume') post('/api/control/resume');
    else if (a === 'rearm') post('/api/control/rearm');
    else if (a === 'kill') startKill();
    else if (a === 'mode-watch') flipModeTo('watch_only');
  });
})();
</script>

</body>
</html>
