# ─────────────────────────────────────────────────────────────────────
# Nifty 100 index constituents — STARTER LIST, REVIEW BEFORE LIVE USE
#
# The Nifty 100 rebalances semi-annually (typically March + September).
# Symbols are added/removed based on market cap + liquidity screens.
# This shipped list is a reasonable approximation of the 100 largest
# NSE-listed names but MAY drift from the current index.
#
# Before relying on this list for live trading:
#   1. Download the latest constituents CSV from:
#        https://www.niftyindices.com/indices/equity/broad-based-indices/NIFTY100
#   2. Diff against the `symbols:` list below.
#   3. If drift > 3 symbols, update the file and bump `reviewed_at`.
#
# Paper trading is more forgiving of drift — the 8-factor scorer will
# just not signal on delisted names, and signals on non-Nifty-100
# liquid names are not catastrophic. Do not treat this as the source
# of truth for production.
# ─────────────────────────────────────────────────────────────────────

